title: PowerShell Encoded Command Execution
id: t1059_001_pwsh_encoded
status: stable
description: >
  Detects use of PowerShell with the encoded-command flag, which is
  frequently used by attackers to obscure the actual payload.
author: Jacob Hess
date: 2026-04-25
level: high
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_args:
    CommandLine|contains:
      - ' --enc '
      - ' --EncodedCommand '
      - ' --e '
  condition: selection_image and selection_args
tags:
  - attack.execution
  - attack.t1059.001
falsepositives:
  - Some legitimate vendor scripts use base64-encoded commands; tune by signer or path.
