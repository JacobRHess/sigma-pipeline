title: LSASS Credential Dump Indicators
id: t1003_001_lsass_dump
status: stable
description: >
  Detects command-line invocations of known LSASS-dump tools or utilities
  passing arguments associated with credential extraction (mimikatz,
  comsvcs.dll MiniDump, procdump targeting lsass.exe).
author: Jacob Hess
date: 2026-04-25
level: critical
logsource:
  category: process_creation
  product: windows
detection:
  selection_mimikatz:
    CommandLine|contains:
      - 'sekurlsa::'
      - 'lsadump::'
      - 'privilege::debug'
  selection_minidump:
    CommandLine|contains:
      - 'comsvcs.dll'
      - 'MiniDump'
  selection_procdump_lsass:
    CommandLine|contains:
      - 'procdump'
    CommandLine|endswith:
      - 'lsass.exe'
      - 'lsass'
  condition: 1 of selection_*
tags:
  - attack.credential_access
  - attack.t1003.001
falsepositives:
  - Defenders running the same tools for blue-team training; tag those hosts.
