name: pr-coverage-diff

# On every PR that touches rules/, post (or update) a sticky comment showing
# what the PR changes about detection coverage: which rules were added,
# removed, or modified, and which ATT&CK techniques are newly covered, no
# longer covered, or shifted in severity.
#
# This is purely informational — the lint-and-test workflow gates merging.
# The diff comment exists to make rule-change reviews fast: reviewers see
# coverage impact at a glance instead of reading raw YAML diffs.

on:
  pull_request:
    paths:
      - 'rules/**'
      - 'src/sigma_pipeline/diff.py'
      - 'src/sigma_pipeline/coverage.py'

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - name: checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: extract base-branch rules
        # The `pull_request` event sets github.base_ref to the target branch
        # name (e.g. "main"). We materialize a worktree at that ref so the
        # diff command can compare PR head against the base.
        run: |
          git worktree add /tmp/baseline "origin/${{ github.base_ref }}"

      - name: run sigma diff
        run: |
          mkdir -p /tmp/baseline-rules
          if [ -d /tmp/baseline/rules ]; then
            cp -r /tmp/baseline/rules/. /tmp/baseline-rules/
          fi
          sigma diff rules/ /tmp/baseline-rules \
            --format markdown \
            --output /tmp/diff.md
          echo "--- comment body ---"
          cat /tmp/diff.md

      - name: post sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/diff.md', 'utf8');
            const marker = '<!-- sigma-pipeline:coverage-diff -->';
            const prNumber = context.issue.number;
            const wrapped = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: wrapped,
              });
              core.info(`updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: wrapped,
              });
              core.info('created new comment');
            }
