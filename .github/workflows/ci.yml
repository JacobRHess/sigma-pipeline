name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Deploy is manual until repo secrets (SPLUNK_HOST/USERNAME/PASSWORD) are
  # configured. Switch the deploy job's `if:` line below to enable auto-deploy
  # on push to main.
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,strict]

      - name: lint Sigma rules
        run: sigma lint rules/

      - name: lint Sigma rules (strict / pySigma advisory)
        # Strict mode runs pySigma's validators alongside ours. Findings are
        # warnings, not errors, so this won't break the build — it surfaces
        # spec-compliance gaps for future improvement.
        run: sigma lint rules/ --strict

      - name: test rules against fixtures
        run: sigma test rules/ --fixtures tests/fixtures

      - name: pytest
        run: pytest -q

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  deploy:
    # Manual trigger for now; flip the `if:` below to
    #   github.event_name == 'push' && github.ref == 'refs/heads/main'
    # once the repo's SPLUNK_HOST / SPLUNK_USERNAME / SPLUNK_PASSWORD secrets
    # are configured.
    needs: lint-and-test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: splunk-prod
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: deploy to Splunk
        env:
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          sigma deploy rules/ \
            --host "${{ secrets.SPLUNK_HOST }}" \
            --port 8089 \
            --app splunk-sigma \
            --target-index main
