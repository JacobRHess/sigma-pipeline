name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: lint Sigma rules
        run: sigma lint rules/

      - name: test rules against fixtures
        run: sigma test rules/ --fixtures tests/fixtures

      - name: ruff
        run: ruff check src/

  deploy:
    # Runs only on push to main, after lint+test pass.
    # Requires repo secrets: SPLUNK_HOST, SPLUNK_USERNAME, SPLUNK_PASSWORD.
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: splunk-prod
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: deploy to Splunk
        env:
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: |
          sigma deploy rules/ \
            --host "${{ secrets.SPLUNK_HOST }}" \
            --port 8089 \
            --app splunk-sigma \
            --target-index main
